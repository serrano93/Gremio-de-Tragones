<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <title>Gremio de Tragones — Sin conexión</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0F172A;
        color: #E2E8F0;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        text-align: center;
        padding: 24px;
      }
      h1 {
        font-family: 'Cinzel', serif;
        font-size: 1.5rem;
        color: #D4AF37;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94A3B8;
        font-size: 0.875rem;
        max-width: 280px;
        line-height: 1.5;
      }
      .shield {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="shield">&#x1F6E1;</div>
      <h1>Sin conexión al reino</h1>
      <p>Tu progreso como aventurero está a salvo. Reconéctate para continuar tus misiones.</p>
    </div>
  </body>
</html>
